<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" rx="12" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b" letter-spacing="0.3">Spec-driven pipeline</text>

  <!-- ===== SPEC CREATION zone ===== -->
  <rect x="20" y="44" width="400" height="90" rx="8" fill="#f59e0b" opacity="0.04" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.2"/>
  <text x="220" y="62" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e" letter-spacing="1">SPEC CREATION — human + agent</text>

  <!-- Discovery -->
  <rect x="30" y="74" width="110" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="85" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Discovery</text>
  <text x="85" y="112" text-anchor="middle" font-size="8" fill="#64748b">understand reality</text>

  <!-- Scoping -->
  <rect x="160" y="74" width="110" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="215" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Scoping</text>
  <text x="215" y="112" text-anchor="middle" font-size="8" fill="#64748b">draw boundaries</text>

  <!-- Architecture -->
  <rect x="290" y="74" width="110" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="345" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Architecture</text>
  <text x="345" y="112" text-anchor="middle" font-size="8" fill="#64748b">design structure</text>

  <!-- Forward arrows (spec creation) -->
  <line x1="140" y1="99" x2="158" y2="99" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="99" x2="288" y2="99" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Architecture → Spec -->
  <line x1="400" y1="99" x2="423" y2="99" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== THE SPEC (artifact at boundary) ===== -->
  <rect x="425" y="60" width="110" height="76" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="80" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">THE SPEC</text>
  <line x1="440" y1="86" x2="520" y2="86" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
  <text x="480" y="100" text-anchor="middle" font-size="8" fill="#16a34a">discovery.json</text>
  <text x="480" y="112" text-anchor="middle" font-size="8" fill="#16a34a">scope.json</text>
  <text x="480" y="124" text-anchor="middle" font-size="8" fill="#16a34a">architecture.json</text>

  <!-- ===== SPEC BOUNDARY ===== -->
  <line x1="555" y1="40" x2="555" y2="138" stroke="#22c55e" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="555" y="152" text-anchor="middle" font-size="9" font-weight="700" fill="#166534" letter-spacing="0.5">SPEC BOUNDARY</text>

  <!-- Arrow: Spec → Estimation -->
  <line x1="535" y1="99" x2="588" y2="99" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== SPEC EXECUTION zone ===== -->
  <rect x="580" y="44" width="520" height="90" rx="8" fill="#3b82f6" opacity="0.04" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2"/>
  <text x="840" y="62" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af" letter-spacing="1">SPEC EXECUTION — autonomous</text>

  <!-- Estimation -->
  <rect x="590" y="74" width="105" height="50" rx="8" fill="#f0f9ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="642" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Estimation</text>
  <text x="642" y="112" text-anchor="middle" font-size="8" fill="#3b82f6">cost + iteration budget</text>

  <!-- Planning -->
  <rect x="715" y="74" width="105" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="767" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Planning</text>
  <text x="767" y="112" text-anchor="middle" font-size="8" fill="#64748b">assemble docs</text>

  <!-- Execution -->
  <rect x="840" y="74" width="110" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="895" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Execution</text>
  <text x="895" y="112" text-anchor="middle" font-size="8" fill="#64748b">build + telemetry</text>

  <!-- Retrospective -->
  <rect x="970" y="74" width="115" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1027" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Retrospective</text>
  <text x="1027" y="112" text-anchor="middle" font-size="8" fill="#16a34a">estimate vs actual</text>

  <!-- Forward arrows (spec execution) -->
  <line x1="695" y1="99" x2="713" y2="99" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="820" y1="99" x2="838" y2="99" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="950" y1="99" x2="968" y2="99" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Calibration feedback loop (Retro → Estimation) -->
  <path d="M 1027 124 L 1027 160 Q 1027 170 1017 170 L 652 170 Q 642 170 642 160 L 642 126"
        fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
  <rect x="770" y="158" width="130" height="24" rx="4" fill="#eff6ff"/>
  <text x="835" y="174" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="500">calibration data</text>

  <!-- Spec quality feedback (Retro → Scoping) -->
  <path d="M 1027 124 L 1027 194 Q 1027 204 1017 204 L 225 204 Q 215 204 215 194 L 215 126"
        fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <rect x="540" y="192" width="160" height="24" rx="4" fill="#fefce8"/>
  <text x="620" y="208" text-anchor="middle" font-size="10" fill="#92400e" font-weight="500">spec quality feedback</text>

  <!-- ===== BOTTOM: Execution detail box ===== -->
  <rect x="150" y="242" width="900" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="266" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Execution: agent runs autonomously from the spec</text>

  <!-- Execution stages -->
  <rect x="185" y="282" width="90" height="36" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="230" y="304" text-anchor="middle" font-size="10" fill="#92400e">Think</text>

  <rect x="300" y="282" width="90" height="36" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="345" y="304" text-anchor="middle" font-size="10" fill="#92400e">Plan</text>

  <rect x="415" y="282" width="90" height="36" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="460" y="304" text-anchor="middle" font-size="10" fill="#92400e">Build</text>

  <rect x="530" y="282" width="90" height="36" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="575" y="304" text-anchor="middle" font-size="10" fill="#92400e">Review</text>

  <rect x="645" y="282" width="90" height="36" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="690" y="304" text-anchor="middle" font-size="10" fill="#92400e">Test</text>

  <rect x="760" y="282" width="90" height="36" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="805" y="304" text-anchor="middle" font-size="10" fill="#92400e">Ship</text>

  <!-- Execution stage arrows -->
  <line x1="275" y1="300" x2="298" y2="300" stroke="#ca8a04" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="390" y1="300" x2="413" y2="300" stroke="#ca8a04" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="505" y1="300" x2="528" y2="300" stroke="#ca8a04" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="620" y1="300" x2="643" y2="300" stroke="#ca8a04" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="735" y1="300" x2="758" y2="300" stroke="#ca8a04" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Telemetry label -->
  <text x="520" y="348" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">telemetry captured at each stage</text>

  <!-- Budget burn indicator -->
  <rect x="880" y="278" width="140" height="44" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="950" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">Budget burn</text>
  <text x="950" y="310" text-anchor="middle" font-size="9" fill="#dc2626">> 80% warn | 100% pause</text>

</svg>
